# Opt-in compose override that exposes kwild's admin RPC to the host on
# port 8485. Layered on top of compose.yaml.
#
# Use via the dedicated task:
#
#   task single:start:admin
#
# Or directly:
#
#   docker compose -f compose.yaml -f compose.admin.yaml up -d
#
# WHEN TO USE
#   - Running the `tn_local` SDK examples (sdk-go, sdk-py, sdk-js LocalActions)
#   - Operating on private/off-chain streams from your own machine
#   - Any other admin JSON-RPC use case from the same host as the node
#
# SECURITY MODEL (defaults below)
#   - Host port is bound to 127.0.0.1 only — only processes on the host
#     itself can reach 8485. This includes `tn_local` running in production
#     on a node-operator's box, as long as the SDK runs on the same host.
#   - Inside the container kwild listens on 0.0.0.0:8485 (docker port
#     mapping requires this). `--admin.notls` is required because that bind
#     is non-loopback from kwild's perspective; the host-side loopback bind
#     is what keeps it private.
#
# REMOTE / MULTI-HOST (production)
#   If the SDK does not run on the same host as the node, plain HTTP is not
#   acceptable and this override is not enough. You need either:
#     1. mTLS — generate `admin.cert` / `admin.key` on the server, give
#        clients a matching cert pair, and drop `--admin.notls` from the
#        command below. Override the host port binding to 0.0.0.0 if the
#        client is off-host.
#     2. `--admin.pass <password>` over TLS. Same caveat about the bind
#        address.
#     3. Tunnel the admin port over SSH / WireGuard / a private network so
#        the SDK can still hit `127.0.0.1:8485` from its end.
#   Pick whichever matches your network model. Never expose `--admin.notls`
#   on a public interface — admin has no built-in authentication, so the
#   transport is your only line of defense.
services:
  tn-db:
    ports:
      # Bind to host loopback only by default. Override TN_ADMIN_BIND if
      # you've set up TLS or a password and intentionally want the port
      # reachable from elsewhere — see the comment block above.
      - "${TN_ADMIN_BIND:-127.0.0.1}:${TN_ADMIN_PORT:-8485}:8485"
    environment:
      # Mirrors the host-side TN_ADMIN_BIND so the entrypoint can fail
      # fast when it's set to a non-loopback address (since the command
      # below always passes --admin.notls — exposing plain HTTP on a
      # public interface is never what we want here).
      TN_ADMIN_BIND: ${TN_ADMIN_BIND:-127.0.0.1}
      # When set to "true", the entrypoint enforces require_signature=true
      # in /root/.kwild/config.toml's [extensions.tn_local] block. Use
      # this for the SDK auth examples and any deployment that wants the
      # SDK to prove possession of the operator key on every admin call.
      # Default is unset (no auth — same as today's tn_local behavior).
      TN_LOCAL_REQUIRE_SIGNATURE: ${TN_LOCAL_REQUIRE_SIGNATURE:-}
    entrypoint: ["/bin/sh", "-c"]
    # Run the standard config bootstrap, optionally enforce the tn_local
    # auth config, then start kwild with admin RPC exposed on the
    # container's 0.0.0.0:8485 (docker port mapping requires the listener
    # to be reachable from outside the container's loopback). --admin.notls
    # is required because that bind is non-loopback inside the container;
    # the host-side bind (TN_ADMIN_BIND) is what keeps it private.
    command:
      - |
        set -e

        # Refuse to launch with --admin.notls on a non-loopback host bind.
        # If the operator wants remote admin access they need to set up TLS
        # / admin.pass themselves (see kwil-docs at /admin/node) and remove
        # --admin.notls from this file's command — not just flip the bind.
        case "$$TN_ADMIN_BIND" in
          127.0.0.1|::1|localhost) ;;
          *)
            echo "FATAL: TN_ADMIN_BIND=$$TN_ADMIN_BIND is non-loopback but the compose passes --admin.notls. This would expose plain-HTTP admin RPC. Configure TLS (https://kwil-docs.vercel.app/docs/admin/node) and edit compose.admin.yaml to drop --admin.notls before exposing the port off-host." >&2
            exit 1
            ;;
        esac

        /app/config.sh

        # Enforce require_signature=true when requested. Three cases:
        #   (a) section absent          → append the block
        #   (b) section present, key set to "true" → no-op
        #   (c) section present, key absent or different → fail fast
        # We don't try to silently rewrite an existing config — config.toml
        # is operator-owned and clobbering it could mask other intentional
        # settings. A clear failure beats a silent override.
        if [ "$$TN_LOCAL_REQUIRE_SIGNATURE" = "true" ]; then
          if grep -q '^\[extensions.tn_local\]' /root/.kwild/config.toml; then
            if grep -q '^require_signature = "true"' /root/.kwild/config.toml; then
              echo "tn_local: require_signature=true already set"
            else
              echo "FATAL: TN_LOCAL_REQUIRE_SIGNATURE=true but /root/.kwild/config.toml's [extensions.tn_local] section does not set require_signature = \"true\". Edit the file to set it, or remove the conflicting section so this entrypoint can append a fresh one." >&2
              exit 1
            fi
          else
            printf '\n[extensions.tn_local]\nrequire_signature = "true"\n' >> /root/.kwild/config.toml
            echo "tn_local: appended require_signature=true to config.toml"
          fi
        fi

        exec /app/kwild start --root /root/.kwild --admin.listen 0.0.0.0:8485 --admin.notls
